<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFTWall Address Lookup</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede8;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #9b9b96;
      --border-tertiary: rgba(0,0,0,0.12);
      --border-secondary: rgba(0,0,0,0.22);
      --border-primary: rgba(0,0,0,0.35);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
      --green-bg: #EAF3DE; --green-text: #3B6D11;
      --red-bg: #FCEBEB; --red-text: #A32D2D;
      --amber-bg: #FAEEDA; --amber-text: #854F0B;
      --blue-bg: #E6F1FB; --blue-text: #185FA5;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1c;
        --bg-secondary: #282826;
        --bg-tertiary: #323230;
        --text-primary: #f0efea;
        --text-secondary: #9b9b96;
        --text-tertiary: #6b6b67;
        --border-tertiary: rgba(255,255,255,0.10);
        --border-secondary: rgba(255,255,255,0.18);
        --border-primary: rgba(255,255,255,0.28);
        --green-bg: #173404; --green-text: #C0DD97;
        --red-bg: #501313; --red-text: #F7C1C1;
        --amber-bg: #412402; --amber-text: #FAC775;
        --blue-bg: #042C53; --blue-text: #B5D4F4;
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    .wrap { max-width: 480px; margin: 0 auto; }

    .header { margin-bottom: 1.75rem; }
    .header h1 {
      font-size: 20px; font-weight: 500; color: var(--text-primary);
      margin-bottom: 5px; display: flex; align-items: center; gap: 8px;
    }
    .header h1 i { font-size: 20px; }
    .header p { font-size: 13px; color: var(--text-secondary); }

    label {
      display: block; font-size: 12px; color: var(--text-secondary);
      margin-bottom: 6px; letter-spacing: 0.02em;
    }

    input[type="text"] {
      width: 100%; padding: 10px 12px; font-size: 13px;
      font-family: var(--font-mono);
      border: 0.5px solid var(--border-secondary);
      border-radius: var(--radius-md);
      background: var(--bg-primary); color: var(--text-primary);
      outline: none; transition: border-color 0.15s; margin-bottom: 12px;
    }
    input[type="text"]:focus { border-color: var(--border-primary); }
    input[type="text"]::placeholder { color: var(--text-tertiary); font-family: var(--font-sans); }

    .toggle-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .toggle-btn {
      flex: 1; padding: 9px 8px; font-size: 13px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-secondary);
      cursor: pointer; background: var(--bg-secondary);
      color: var(--text-secondary); transition: all 0.15s;
      font-family: var(--font-sans);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .toggle-btn.active {
      background: var(--bg-primary); color: var(--text-primary);
      border-color: var(--border-primary); font-weight: 500;
    }
    .toggle-btn i { font-size: 16px; }

    .fetch-btn {
      width: 100%; padding: 11px; font-size: 14px; font-weight: 500;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-secondary);
      background: var(--bg-primary); color: var(--text-primary);
      cursor: pointer; transition: all 0.15s; font-family: var(--font-sans);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .fetch-btn:hover { background: var(--bg-secondary); }
    .fetch-btn:active { transform: scale(0.98); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .fetch-btn i { font-size: 16px; }

    .proxy-note {
      margin-top: 10px; padding: 10px 12px;
      background: var(--blue-bg); border-radius: var(--radius-md);
      font-size: 12px; color: var(--blue-text);
      display: flex; align-items: flex-start; gap: 8px;
    }
    .proxy-note i { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

    .status {
      margin-top: 12px; font-size: 13px;
      color: var(--text-secondary); text-align: center; min-height: 20px;
    }
    .status.error { color: var(--red-text); }

    .type-label {
      font-size: 12px; color: var(--text-secondary);
      text-align: center; margin: 1rem 0 6px;
    }

    .card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
    }

    .card-header {
      display: flex; align-items: center; gap: 12px;
      padding-bottom: 12px;
      border-bottom: 0.5px solid var(--border-tertiary);
      margin-bottom: 14px;
    }

    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .avatar.active { background: var(--green-bg); color: var(--green-text); }
    .avatar.inactive { background: var(--red-bg); color: var(--red-text); }

    .card-title {
      font-size: 13px; font-weight: 500; color: var(--text-primary);
      word-break: break-all; font-family: var(--font-mono); margin-bottom: 5px;
    }
    .badges { display: flex; flex-wrap: wrap; gap: 5px; }

    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }
    .badge i { font-size: 10px; }
    .badge.active { background: var(--green-bg); color: var(--green-text); }
    .badge.inactive { background: var(--red-bg); color: var(--red-text); }
    .badge.stopped { background: var(--amber-bg); color: var(--amber-text); }
    .badge.validator { background: var(--blue-bg); color: var(--blue-text); }

    .metrics {
      display: grid; grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px; margin-bottom: 16px;
    }
    .metric {
      background: var(--bg-secondary);
      border-radius: var(--radius-md); padding: 12px 14px;
    }
    .metric-label {
      font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .metric-val { font-size: 22px; font-weight: 500; color: var(--text-primary); word-break: break-all; }

    .fields { display: flex; flex-direction: column; }
    .field {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 9px 0; border-bottom: 0.5px solid var(--border-tertiary); gap: 12px;
    }
    .field:last-child { border-bottom: none; }
    .field-label { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; padding-top: 1px; }
    .field-val {
      font-size: 12px; color: var(--text-primary);
      text-align: right; word-break: break-all;
      font-family: var(--font-mono); max-width: 65%;
    }
    .field-val.plain { font-family: var(--font-sans); }
    .null-val { color: var(--text-tertiary); font-family: var(--font-sans); }
    .yes { color: var(--green-text); font-family: var(--font-sans); }
    .no { color: var(--red-text); font-family: var(--font-sans); }

    .copy-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-tertiary); padding: 0 0 0 4px;
      font-size: 13px; vertical-align: middle; transition: color 0.15s;
    }
    .copy-btn:hover { color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1><i class="ti ti-wallet"></i> NFTWall address lookup</h1>
      <p>Enter a wallet address to fetch on-chain user data</p>
    </div>

    <label for="addrInput">Wallet address</label>
    <input type="text" id="addrInput" placeholder="0x..." spellcheck="false" autocomplete="off" />

    <label>Data type</label>
    <div class="toggle-row">
      <button class="toggle-btn active" id="btn0" onclick="setMode(0)">
        <i class="ti ti-user"></i> Standard
      </button>
      <button class="toggle-btn" id="btn1" onclick="setMode(1)">
        <i class="ti ti-star"></i> Prime
      </button>
    </div>

    <button class="fetch-btn" id="fetchBtn" onclick="fetchData()">
      <i class="ti ti-search"></i> Look up address
    </button>

    <div class="proxy-note">
      <i class="ti ti-info-circle"></i>
      <span>Requests are routed securely through your dedicated Cloudflare Worker proxy to safely handle custom server ports.</span>
    </div>

    <div class="status" id="status"></div>
    <div id="result"></div>
  </div>

  <script>
    let mode = 0;

    function setMode(m) {
      mode = m;
      document.getElementById('btn0').classList.toggle('active', m === 0);
      document.getElementById('btn1').classList.toggle('active', m === 1);
    }

    function buildUrl(addr) {
      const target = `https://api.nftwall.io:2096/api/call-proc?procedureName=get_rpt_users_data&forprime=${mode}&node=${addr}`;
      return `https://flat-thunder-6b02.gr4nth1kprod.workers.dev/?url=${encodeURIComponent(target)}`;
    }

    function addrShort(addr) {
      if (!addr) return null;
      return addr.slice(0, 10) + '…' + addr.slice(-6);
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.innerHTML = '<i class="ti ti-check"></i>';
        setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy"></i>'; }, 1500);
      });
    }

    function addrField(addr) {
      if (!addr || addr === 'null') return '<span class="null-val">—</span>';
      const short = addrShort(addr);
      const id = 'cb_' + Math.random().toString(36).slice(2);
      return `<span title="${addr}">${short}</span>
        <button class="copy-btn" id="${id}"
          onclick="copyText('${addr}', document.getElementById('${id}'))"
          title="Copy address"><i class="ti ti-copy"></i></button>`;
    }

    function boolField(val) {
      if (val === true) return '<span class="yes">Yes</span>';
      if (val === false) return '<span class="no">No</span>';
      return '<span class="null-val">—</span>';
    }

    async function fetchData() {
      const addr = document.getElementById('addrInput').value.trim();
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('result');
      const btn = document.getElementById('fetchBtn');

      if (!addr || !addr.startsWith('0x')) {
        statusEl.textContent = 'Please enter a valid 0x wallet address.';
        statusEl.className = 'status error';
        return;
      }

      btn.disabled = true;
      statusEl.className = 'status';
      statusEl.textContent = 'Fetching data…';
      resultEl.innerHTML = '';

      const url = buildUrl(addr);

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const json = await res.json();

        if (!json.success || !json.data || !json.data[0] || !json.data[0][0]) {
          statusEl.textContent = 'No data found for this address.';
          statusEl.className = 'status error';
          btn.disabled = false;
          return;
        }

        statusEl.textContent = '';
        renderCard(json.data[0][0]);
      } catch (e) {
        statusEl.textContent = 'Request failed. Ensure your Cloudflare worker is online and handles CORS response headers correctly.';
        statusEl.className = 'status error';
        console.error(e);
      }

      btn.disabled = false;
    }

    function renderCard(d) {
      const el = document.getElementById('result');
      const isActive = d.isActive === true;
      const isStopped = d.isStop === true;
      const isValidator = d.validator === true;

      const business = typeof d.myBusiness === 'number'
        ? d.myBusiness.toFixed(4)
        : (d.myBusiness ?? '—');
      const qty = d.myQty ?? '—';
      const node = d.node ?? '';
      const uinst = d.uinst ?? d.nodeIns ?? null;

      const statusBadge = isActive
        ? `<span class="badge active"><i class="ti ti-check"></i> Active</span>`
        : `<span class="badge inactive"><i class="ti ti-x"></i> Inactive</span>`;
      const stopBadge = isStopped
        ? `<span class="badge stopped"><i class="ti ti-player-stop"></i> Stopped</span>` : '';
      const validatorBadge = isValidator
        ? `<span class="badge validator"><i class="ti ti-shield-check"></i> Validator</span>` : '';

      let extraRows = '';

      if (d.rank !== undefined && d.rank !== null)
        extraRows += `<div class="field"><span class="field-label">Rank</span><span class="field-val plain">${d.rank}</span></div>`;

      if (d.directs !== undefined && d.directs !== null)
        extraRows += `<div class="field"><span class="field-label">Directs</span><span class="field-val plain">${d.directs}</span></div>`;

      if (uinst)
        extraRows += `<div class="field"><span class="field-label">${d.uinst ? 'Smart Contract' : 'Node Ins'}</span><span class="field-val">${addrField(uinst)}</span></div>`;

      if (d.validator !== undefined)
        extraRows += `<div class="field"><span class="field-label">Validator</span><span class="field-val">${boolField(d.validator)}</span></div>`;

      if (d.chatId !== undefined)
        extraRows += `<div class="field"><span class="field-label">Chat ID</span><span class="field-val plain">${d.chatId !== null ? d.chatId : '<span class="null-val">—</span>'}</span></div>`;

      if (d.token)
        extraRows += `<div class="field"><span class="field-label">Token</span><span class="field-val" style="font-size:10px;">${d.token.slice(0, 24)}…</span></div>`;

      el.innerHTML = `
        <p class="type-label">${mode === 0 ? 'Standard (forprime=0)' : 'Prime (forprime=1)'} · ${new Date().toLocaleTimeString()}</p>
        <div class="card">
          <div class="card-header">
            <div class="avatar ${isActive ? 'active' : 'inactive'}">
              <i class="ti ${isActive ? 'ti-user-check' : 'ti-user-off'}"></i>
            </div>
            <div style="flex:1;min-width:0;">
              <div class="card-title">${addrShort(node)}</div>
              <div class="badges">${statusBadge}${stopBadge}${validatorBadge}</div>
            </div>
          </div>

          <div class="metrics">
            <div class="metric">
              <div class="metric-label">Business</div>
              <div class="metric-val">${business}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Quantity</div>
              <div class="metric-val">${qty}</div>
            </div>
          </div>

          <div class="fields">
            <div class="field">
              <span class="field-label">Wallet Address</span>
              <span class="field-val">${addrField(node)}</span>
            </div>
            ${extraRows}
          </div>
        </div>`;
    }

    document.getElementById('addrInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') fetchData();
    });
  </script>
</body>
</html>
